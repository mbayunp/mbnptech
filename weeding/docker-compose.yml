version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mbnp_invite_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mbnpinvite
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: mbnp_invite_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mbnp_invite_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=mysql://root:rootpassword@db:3306/mbnpinvite
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=mbnp_secret_key_production_ready_123!
      - FRONTEND_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mbnp_invite_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_BASE_URL=http://localhost:5000
      - NEXT_PUBLIC_APP_DOMAIN=localhost:3000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: mbnp_invite_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
